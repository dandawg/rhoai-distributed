apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kueue-cluster-default
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: kueue-cluster-default
    app.kubernetes.io/part-of: rhoai-distributed
spec:
  project: default
  source:
    repoURL: https://github.com/redhat-ai-americas/rhoai-distributed.git
    targetRevision: main
    path: platform/kueue/cluster
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
